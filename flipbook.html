let cur = 0;
const stageEl = document.getElementById('stage');
const dotsEl  = document.getElementById('dots');
const curEl   = document.getElementById('cur');
const totEl   = document.getElementById('tot');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

// Build pages
PAGES.forEach((p, i) => {
  const page = document.createElement('div');
  page.className = 'page' + (p.cover ? ' cover' : '') + (i === 0 ? ' active' : '');

  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML = `
    <span class="page-num">${i + 1} / ${PAGES.length}</span>
    <span class="page-star">${p.star || '✦'}</span>
    <h1 class="page-title">${p.title}</h1>
    <p class="page-subtitle">${p.subtitle}</p>
    <div class="page-divider"></div>
  `;

  const body = document.createElement('div');
  body.className = 'page-body';

  const text = document.createElement('div');
  text.className = 'page-text';
  text.innerHTML = p.html;

  body.appendChild(text);
  page.appendChild(header);
  page.appendChild(body);
  stageEl.appendChild(page);
});

// Build TOC dynamically
const tocListEl = document.getElementById('toc-list');
if (tocListEl) {
  // Find indices of Starseed type pages (skip cover, toc, about, cta)
  const soulTypes = PAGES
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => !p.cover && !p.toc && !p.cta && !p.about);

  const tocHTML = soulTypes.map(({ p, i }) => {
    const num = i + 1;
    return `<div class="toc-item" onclick="show(${i})" style="
      display:flex; justify-content:space-between; align-items:center;
      padding: 7px 0; border-bottom: 1px solid rgba(255,215,0,0.1);
      cursor:pointer; transition: color 0.2s;
    ">
      <span style="color: var(--gold); font-family:'Cormorant Garamond',serif; font-size:1.05rem; letter-spacing:0.5px;">${p.title}<span style="color:rgba(232,232,240,0.4); font-style:italic; font-size:0.85rem;"> &middot; ${p.subtitle}</span></span>
      <span style="color: rgba(232,232,240,0.4); font-size:0.8rem; font-family:'Inter',sans-serif; letter-spacing:1px;">${num}</span>
    </div>`;
  }).join('');

  tocListEl.innerHTML = `
    <div style="font-size:0.75rem; letter-spacing:2px; color:rgba(232,232,240,0.4); font-family:'Inter',sans-serif; text-transform:uppercase; margin-bottom:12px;">Tap a name to jump directly</div>
    ${tocHTML}
  `;
}

// Build dots
PAGES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

totEl.textContent = PAGES.length;
prevBtn.disabled = true;

function show(idx) {
  const pages = stageEl.querySelectorAll('.page');
  const dots  = dotsEl.querySelectorAll('.dot');
  pages[cur].classList.remove('active');
  dots[cur].classList.remove('active');
  cur = idx;
  pages[cur].classList.add('active');
  dots[cur].classList.add('active');
  const body = pages[cur].querySelector('.page-body');
  if (body) body.scrollTop = 0;
  curEl.textContent = cur + 1;
  prevBtn.disabled  = cur === 0;
  nextBtn.disabled  = cur === PAGES.length - 1;
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < PAGES.length) show(n);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Touch swipe
let tx = 0, ty = 0, swiping = false;
document.addEventListener('touchstart', e => {
  tx = e.changedTouches[0].clientX;
  ty = e.changedTouches[0].clientY;
  swiping = false;
}, { passive: true });
document.addEventListener('touchmove', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - tx);
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if (dx > dy && dx > 12) swiping = true;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
}, { passive: true });
</script>
