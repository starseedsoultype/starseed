<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarSeed Soul Typology — Interactive Flipbook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0e27;
            --primary-purple: #6b46c1;
            --primary-gold: #d4af37;
            --accent-violet: #a855f7;
            --text-light: #e8e8f0;
            --text-muted: #b0b0c0;
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a1a3e 100%);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flipbook-container {
            width: 100%;
            height: 100vh;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .page {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
            border: 2px solid var(--primary-gold);
            border-radius: 12px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: absolute;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.2);
            overflow-y: auto;
        }

        .page.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
            z-index: 10;
        }

        .page.prev {
            transform: translateX(-100%);
        }

        .page-number {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 14px;
            color: var(--primary-gold);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .page-title {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .page-subtitle {
            font-size: 1.1em;
            color: var(--accent-violet);
            margin-bottom: 30px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .page-content {
            font-size: 1em;
            line-height: 1.8;
            color: var(--text-light);
            max-height: 300px;
            overflow-y: auto;
            padding-right: 15px;
        }

        .page-content::-webkit-scrollbar {
            width: 6px;
        }

        .page-content::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 3px;
        }

        .cover-page {
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(107, 70, 193, 0.05) 100%);
        }

        .cover-page .page-title {
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        .cover-page .page-subtitle {
            font-size: 1.4em;
            margin-bottom: 50px;
        }

        .cover-page .page-content {
            max-height: none;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .navigation {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 20;
        }

        .nav-button {
            width: 50px;
            height: 50px;
            border: 2px solid var(--primary-gold);
            background: rgba(107, 70, 193, 0.3);
            color: var(--primary-gold);
            cursor: pointer;
            font-size: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.1);
        }

        .nav-button:active {
            transform: scale(0.95);
        }

        .page-counter {
            color: var(--primary-gold);
            font-size: 14px;
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .touch-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .page {
                padding: 40px 25px;
                max-height: 70vh;
            }

            .page-title {
                font-size: 1.8em;
                letter-spacing: 2px;
            }

            .page-subtitle {
                font-size: 0.95em;
            }

            .page-content {
                font-size: 0.95em;
                line-height: 1.7;
                max-height: 200px;
            }

            .navigation {
                bottom: 20px;
                gap: 15px;
            }

            .nav-button {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .page-counter {
                font-size: 12px;
                min-width: 50px;
            }

            .page-number {
                top: 15px;
                right: 20px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 30px 15px;
                max-height: 60vh;
            }

            .page-title {
                font-size: 1.4em;
                margin-bottom: 15px;
            }

            .page-subtitle {
                font-size: 0.85em;
                margin-bottom: 20px;
            }

            .page-content {
                font-size: 0.85em;
                max-height: 150px;
            }

            .navigation {
                bottom: 15px;
                gap: 10px;
            }

            .nav-button {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .page-counter {
                font-size: 11px;
                min-width: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="touch-hint">← Swipe or Click to Navigate →</div>

    <div class="flipbook-container">
        <div id="pages-container"></div>
    </div>

    <div class="navigation">
        <button class="nav-button" id="prev-btn" onclick="previousPage()">‹</button>
        <div class="page-counter"><span id="current-page">1</span> / <span id="total-pages">27</span></div>
        <button class="nav-button" id="next-btn" onclick="nextPage()">›</button>
    </div>

            },
            {
                title: "Arcturian Souls",

                content: "Your mind is your greatest gift. You see systems, patterns, and the underlying logic of how things work. You understand the world through reason and structure. Your creativity flows from your ability to synthesize complex information into elegant solutions. You are the strategist, the planner, the one who sees ten steps ahead. Your gift is bringing order to chaos. Your challenge is learning that not everything can be solved through logic alone—some things require intuition and faith."
            },

                title: "Orion Souls",
                subtitle: "The Grounded Thinkers",
                content: "You think with your feet on the ground. Your logic is practical, applied, rooted in the material world. You understand cause and effect through direct experience. You build systems that work in the real world, not just in theory. Your gift is translating abstract ideas into concrete action. You are the builder, the implementer, the one who makes things real. Your challenge is learning that sometimes the most important truths cannot be measured or quantified."

                title: "Zeta Reticulan Souls",
                subtitle: "The Intuitive Analysts",
                content: "You blend logic with intuition in a way that feels almost supernatural. You know things without knowing how you know them. Your analytical mind is guided by a deeper intelligence. You are the strategist with a sixth sense. Your gift is seeing through illusion to the truth beneath. You understand people and systems at a profound level. Your challenge is learning to trust your intuition even when it contradicts the evidence before you."
            },
            {
                title: "Epsilon Eridan Souls",
                subtitle: "The Practical Innovators",
                content: "You are the bridge between theory and practice. Your logic is grounded in material reality, but your mind reaches for new possibilities. You understand how to build systems that are both efficient and innovative. Your gift is creating practical solutions to complex problems. You are the engineer, the architect, the one who makes the impossible possible. Your challenge is learning that sometimes imperfection is necessary for progress."
            },
            {
                title: "Atlantean Souls",
                subtitle: "The Relational Thinkers",
                content: "Your logic is guided by your understanding of human nature. You think about how ideas affect people, how systems impact relationships. You are the strategist who never loses sight of the human element. Your gift is creating systems that serve people, not the other way around. Your challenge is learning that sometimes logic must override compassion, and that is not a betrayal."

            },
            {

                subtitle: "The Energetic Manifestors",
                content: "You manifest through will and desire. Your material world is built on your ability to want something and make it real. You are the entrepreneur, the builder, the one who creates through sheer determination. Your gift is turning dreams into reality. Your challenge is learning that not everything worth having comes through force."
            },
            {

                subtitle: "The Vital Builders",
                content: "You are the one who builds through energy and action. Your material world is created through your willingness to work, to move, to do. You are the laborer, the creator, the one who makes things with your hands. Your gift is bringing things into being. Your challenge is learning that rest is not laziness—it is necessary for sustained creation."
            },
            {
                title: "Anunnaki Souls",
                subtitle: "The Powerful Manifestors",
                content: "You manifest through power and presence. Your material world is built on your ability to command respect and resources. You are the leader, the authority, the one who shapes reality through will. Your gift is creating order and structure. Your challenge is learning that true power comes from service, not domination."
            },
            {
                title: "Hyperborean Souls",
                subtitle: "The Grounded Architects",
                content: "You are the one who builds lasting structures. Your material world is created through patience, planning, and deep understanding. You are the architect, the craftsperson, the one who creates with precision. Your gift is building things that endure. Your challenge is learning that perfection is the enemy of progress, and that sometimes 'good enough' is exactly right."
            },
            {
                title: "The Journey Continues",
                subtitle: "Remember Your Truth",
                content: "You have journeyed through the 24 cosmic blueprints. Each one carries a frequency, a gift, a challenge. You are not just one type—you are a constellation of energies, a unique expression of the cosmos.<br><br>The portal awaits your return.<br><br><em>starseedsoultype.github.io/starseed</em>"
            }
        ];

        let currentPageIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;

        function initializePages() {
            const container = document.getElementById('pages-container');
            pages.forEach((page, index) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page' + (page.isCover ? ' cover-page' : '');
                if (index === 0) pageDiv.classList.add('active');

                pageDiv.innerHTML = `
                    <div class="page-number">${index + 1} / ${pages.length}</div>
                    <h1 class="page-title">${page.title}</h1>
                    <p class="page-subtitle">${page.subtitle}</p>
                    <div class="page-content">${page.content}</div>
                `;

                container.appendChild(pageDiv);
            });

            document.getElementById('total-pages').textContent = pages.length;
            updatePageCounter();
        }

        function nextPage() {
            if (currentPageIndex < pages.length - 1) {
                currentPageIndex++;
                updatePageDisplay();
            }
        }

        function previousPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                updatePageDisplay();
            }
        }

        function updatePageDisplay() {
            const pageElements = document.querySelectorAll('.page');
            pageElements.forEach((page, index) => {
                page.classList.remove('active', 'prev');
                if (index === currentPageIndex) {
                    page.classList.add('active');
                } else if (index < currentPageIndex) {
                    page.classList.add('prev');
                }
            });
            updatePageCounter();
        }

        function updatePageCounter() {
            document.getElementById('current-page').textContent = currentPageIndex + 1;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') previousPage();
        });

        // Touch/Swipe navigation
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX > swipeThreshold) {
                nextPage();
            } else if (touchEndX - touchStartX > swipeThreshold) {
                previousPage();
            }
        }

        // Click navigation on page edges
        document.addEventListener('click', (e) => {
            const container = document.querySelector('.flipbook-container');
            const rect = container.getBoundingClientRect();
            const clickX = e.clientX - rect.left;

            if (clickX < rect.width / 3) {
                previousPage();
            } else if (clickX > (rect.width * 2) / 3) {
                nextPage();
            }
        });

        // Initialize on load
        window.addEventListener('load', initializePages);
    </script>
</body>
</html>
