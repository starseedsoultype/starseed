  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07091e;
      --gold: #d4af37;
      --gold-dim: rgba(212,175,55,0.22);
      --violet: #a855f7;
      --text: #e8e8f0;
      --muted: #8888a0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: radial-gradient(ellipse at 50% 0%, #1a1050 0%, var(--bg) 65%);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: block;
      overflow: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
        radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 130px 80px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, rgba(212,175,55,0.6), rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.3;
      z-index: -1;
      pointer-events: none;
    }

    /* ── HINT ── */
    .hint {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 8px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(7,9,30,0.6);
    }

    /* ── STAGE — fills between hint and nav ── */
    .stage {
      position: fixed;
      top: 27px;    /* hint height */
      bottom: 70px; /* nav height */
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      overflow: hidden;
    }

    /* ── CARD ── */
    .card {
      display: none;
      width: 100%;
      max-width: 720px;
      /* Height adapts to stage, never overflows */
      max-height: 100%;
      overflow-y: auto;
      background: linear-gradient(145deg, rgba(107,70,193,0.14) 0%, rgba(168,85,247,0.06) 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 16px;
      padding: 36px 32px 28px;
      position: relative;
      box-shadow: 0 8px 40px rgba(212,175,55,0.07);
      animation: fadeUp 0.4s ease;
      /* Scrollbar styling */
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }

    .card::-webkit-scrollbar { width: 4px; }
    .card::-webkit-scrollbar-track { background: transparent; }
    .card::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .card.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-num {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'Raleway', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: 0.5;
    }

    .card-star {
      font-size: 18px;
      margin-bottom: 10px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.15rem, 3.5vw, 2rem);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .card-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      font-style: italic;
      color: var(--violet);
      letter-spacing: 1px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .card-divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 16px;
      flex-shrink: 0;
    }

    .card-text {
      font-size: clamp(0.88rem, 2vw, 1.05rem);
      line-height: 1.8;
      color: var(--text);
      max-width: 580px;
    }

    /* Cover page */
    .card.cover .card-title {
      font-size: clamp(1.4rem, 4.5vw, 2.4rem);
      margin-bottom: 10px;
    }
    .card.cover .card-subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      margin-bottom: 20px;
    }

    /* CTA button */
    .cta-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 28px;
      border: 1px solid var(--gold);
      border-radius: 40px;
      color: var(--gold);
      text-decoration: none;
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
      flex-shrink: 0;
    }
    .cta-link:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* ── NAVIGATION ── */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 12px 16px max(12px, env(safe-area-inset-bottom));
      background: rgba(7,9,30,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      height: 70px;
    }

    .nav-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(107,70,193,0.25);
      color: var(--gold);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      flex-shrink: 0;
    }
    .nav-btn:hover  { background: rgba(212,175,55,0.15); box-shadow: 0 0 16px rgba(212,175,55,0.3); }
    .nav-btn:active { transform: scale(0.9); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .nav-counter {
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: 0.75;
      min-width: 52px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── DOTS ── */
    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 250px;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.35;
      transition: background 0.3s, opacity 0.3s, transform 0.3s;
      flex-shrink: 0;
    }
    .dot.active {
      background: var(--gold);
      opacity: 1;
      transform: scale(1.5);
    }

    /* ── SMALL PHONES (< 400px) ── */
    @media (max-width: 400px) {
      .card { padding: 28px 16px 22px; border-radius: 12px; }
      .card-star { font-size: 16px; margin-bottom: 8px; }
      .card-subtitle { margin-bottom: 12px; }
      .card-divider { margin-bottom: 12px; }
      .nav-btn { width: 42px; height: 42px; font-size: 20px; }
      .nav { gap: 12px; }
    }

    /* ── SHORT SCREENS (landscape mobile) ── */
    @media (max-height: 500px) {
      .hint { display: none; }
      .stage { top: 0; bottom: 60px; }
      .card { padding: 16px 16px 12px; }
      .card-star { display: none; }
      .card-divider { margin-bottom: 8px; }
      .card-subtitle { margin-bottom: 8px; }
      .nav { height: 60px; }
      .nav-btn { width: 36px; height: 36px; font-size: 18px; }
    }
  </style>
</head>
<body>

let cur = 0;
const stage    = document.getElementById('stage');
const dotsEl   = document.getElementById('dots');
const curEl    = document.getElementById('cur');
const totEl    = document.getElementById('tot');
const prevBtn  = document.getElementById('prev-btn');
const nextBtn  = document.getElementById('next-btn');

// Build cards
PAGES.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card' + (p.cover ? ' cover' : '') + (i === 0 ? ' active' : '');

  let html = `<span class="card-num">${i + 1} / ${PAGES.length}</span>`;
  if (p.star) html += `<div class="card-star">${p.star}</div>`;
  html += `<h1 class="card-title">${p.title}</h1>`;
  html += `<p class="card-subtitle">${p.subtitle}</p>`;
  html += `<div class="card-divider"></div>`;
  html += `<p class="card-text">${p.text}</p>`;
  if (p.cta) html += `<a class="cta-link" href="https://starseedsoultype.github.io/starseed" target="_blank">Open the Portal</a>`;

  card.innerHTML = html;
  stage.appendChild(card);
});

// Build dots
PAGES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

totEl.textContent = PAGES.length;
prevBtn.disabled = true;

function show(idx) {
  const cards = stage.querySelectorAll('.card');
  const dots  = dotsEl.querySelectorAll('.dot');

  cards[cur].classList.remove('active');
  dots[cur].classList.remove('active');
  cur = idx;
  cards[cur].classList.add('active');
  dots[cur].classList.add('active');

  // Scroll card back to top
  cards[cur].scrollTop = 0;

  curEl.textContent  = cur + 1;
  prevBtn.disabled   = cur === 0;
  nextBtn.disabled   = cur === PAGES.length - 1;
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < PAGES.length) show(n);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Touch swipe — horizontal only, don't block vertical card scroll
let tx = 0, ty = 0, swiping = false;

document.addEventListener('touchstart', e => {
  tx = e.changedTouches[0].clientX;
  ty = e.changedTouches[0].clientY;
  swiping = false;
}, { passive: true });

document.addEventListener('touchmove', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - tx);
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if (dx > dy && dx > 10) swiping = true;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
}, { passive: true });

// Click on screen edges to navigate
document.addEventListener('click', e => {
  if (e.target.closest('button') || e.target.closest('a') || e.target.closest('.card')) return;
  const w = window.innerWidth;
  if (e.clientX < w * 0.2) go(-1);
  else if (e.clientX > w * 0.8) go(1);
});
</script>
</body>
</html>
