<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StarSeed Soul Typology v3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Cinzel'; font-display: swap; }
@font-face { font-family: 'Cormorant Garamond'; font-display: swap; }
@font-face { font-family: 'Raleway'; font-display: swap; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–W: clamp(280px, 88vw, 420px);
–H: clamp(400px, 72vh, 580px);
–gold: #c9a84c;
–gold2: #e8c97a;
–dust: #c8b4f0;
–pale: #f0eaff;
–rose: #d4a0b0;
–teal: #7ececa;
–flip-dur: 680ms;
}

html, body {
width: 100%; height: 100%;
background: #03020c;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
overflow: hidden;
font-family: ‘Raleway’, ‘Helvetica Neue’, sans-serif;
touch-action: none;
user-select: none;
-webkit-user-select: none;
}

/* ── Cosmic background ── */
.cosmos {
position: fixed; inset: 0; pointer-events: none; z-index: 0;
background:
radial-gradient(ellipse 65% 45% at 15% 20%, rgba(28,4,55,0.9) 0%, transparent 60%),
radial-gradient(ellipse 55% 65% at 85% 80%, rgba(8,20,65,0.75) 0%, transparent 60%),
radial-gradient(ellipse 40% 40% at 50% 50%, rgba(5,3,15,0.5) 0%, transparent 70%),
#03020c;
}
.cosmos::after {
content: ‘’; position: absolute; inset: 0;
background-image:
radial-gradient(1.2px 1.2px at  7%  9%, rgba(255,255,255,.95) 0,transparent 100%),
radial-gradient(1px   1px   at 19% 47%, rgba(255,255,255,.70) 0,transparent 100%),
radial-gradient(1px   1px   at 33%  6%, rgba(255,255,255,.85) 0,transparent 100%),
radial-gradient(1px   1px   at 53% 68%, rgba(255,255,255,.60) 0,transparent 100%),
radial-gradient(1.2px 1.2px at 68% 15%, rgba(255,255,255,.90) 0,transparent 100%),
radial-gradient(1px   1px   at 82% 42%, rgba(255,255,255,.75) 0,transparent 100%),
radial-gradient(1px   1px   at 91% 85%, rgba(255,255,255,.80) 0,transparent 100%),
radial-gradient(1px   1px   at 14% 78%, rgba(255,255,255,.55) 0,transparent 100%),
radial-gradient(1px   1px   at 46% 33%, rgba(255,255,255,.65) 0,transparent 100%),
radial-gradient(1px   1px   at 60% 88%, rgba(255,255,255,.70) 0,transparent 100%),
radial-gradient(2px   2px   at 28% 22%, rgba(201,168,76,.55)  0,transparent 100%),
radial-gradient(2px   2px   at 74% 58%, rgba(200,180,240,.45) 0,transparent 100%),
radial-gradient(1px   1px   at  4% 38%, rgba(255,255,255,.60) 0,transparent 100%),
radial-gradient(1px   1px   at 88% 18%, rgba(255,255,255,.80) 0,transparent 100%),
radial-gradient(1px   1px   at 41% 92%, rgba(255,255,255,.50) 0,transparent 100%),
radial-gradient(1.5px 1.5px at 57% 25%, rgba(200,180,240,.40) 0,transparent 100%),
radial-gradient(1px   1px   at 76% 72%, rgba(255,255,255,.65) 0,transparent 100%),
radial-gradient(1px   1px   at 23% 58%, rgba(255,255,255,.55) 0,transparent 100%);
}

/* ── Book scene ── */
.scene {
position: relative; z-index: 10;
display: flex; flex-direction: column;
align-items: center; gap: 30px;
}

/* Perspective wrapper — this is what makes 3D work */
.book {
position: relative;
width: var(–W);
height: var(–H);
perspective: 1800px;
perspective-origin: 50% 50%;
}

/* Book drop shadow */
.book::after {
content: ‘’;
position: absolute;
bottom: -22px; left: 8%; right: 8%; height: 24px;
background: radial-gradient(ellipse, rgba(0,0,0,.6) 0%, transparent 70%);
filter: blur(7px);
pointer-events: none;
}

/* ── Individual page ── */
.page {
position: absolute; inset: 0;
width: var(–W); height: var(–H);
transform-origin: left center;
/* NOTE: no preserve-3d here — conflicts with overflow:hidden in Safari */
border-radius: 3px 12px 12px 3px;
overflow: hidden;
transform: rotateY(0deg);
transition: none;
/* GPU acceleration hint */
will-change: transform;
-webkit-backface-visibility: hidden;
backface-visibility: hidden;
}

/* Spine gradient */
.page::before {
content: ‘’;
position: absolute; left: 0; top: 0; bottom: 0; width: 24px;
background: linear-gradient(90deg, rgba(0,0,0,.6) 0%, rgba(255,255,255,.04) 55%, transparent 100%);
z-index: 20; pointer-events: none;
}

/* Page turn shadow — visible during flip */
.page-shadow {
position: absolute; inset: 0;
background: linear-gradient(90deg, transparent 70%, rgba(0,0,0,.35) 100%);
opacity: 0;
pointer-events: none;
z-index: 19;
border-radius: 3px 12px 12px 3px;
}

/* Corner curl hint on current page */
.page.is-current .page-shadow {
background: linear-gradient(90deg, transparent 80%, rgba(0,0,0,.15) 100%);
opacity: 1;
}

/* ── Flip animations ── */
@keyframes flip-forward {
0%   { transform: rotateY(0deg);     }
45%  { transform: rotateY(-90deg);   }
100% { transform: rotateY(-180deg);  }
}

@keyframes flip-backward {
0%   { transform: rotateY(-180deg);  }
55%  { transform: rotateY(-90deg);   }
100% { transform: rotateY(0deg);     }
}

.page.flipping-fwd {
animation: flip-forward var(–flip-dur) cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.page.flipping-bwd {
animation: flip-backward var(–flip-dur) cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* Shadow sweeps during forward flip */
@keyframes shadow-fwd {
0%   { opacity: 0; background: linear-gradient(90deg, transparent 80%, rgba(0,0,0,.1) 100%); }
45%  { opacity: 1; background: linear-gradient(90deg, rgba(0,0,0,.25) 0%, transparent 40%, rgba(0,0,0,.3) 100%); }
100% { opacity: 0; }
}
.page.flipping-fwd .page-shadow { animation: shadow-fwd var(–flip-dur) ease forwards; }

@keyframes shadow-bwd {
0%   { opacity: 0; }
45%  { opacity: 1; background: linear-gradient(90deg, rgba(0,0,0,.25) 0%, transparent 40%, rgba(0,0,0,.2) 100%); }
100% { opacity: 0; }
}
.page.flipping-bwd .page-shadow { animation: shadow-bwd var(–flip-dur) ease forwards; }

/* ── Tap zones ── */
.tap-fwd {
position: absolute; right: 0; top: 0; bottom: 0; width: 64px;
z-index: 30; cursor: pointer;
display: flex; align-items: flex-end; justify-content: flex-end;
padding: 12px;
}
.tap-bwd {
position: absolute; left: 0; top: 0; bottom: 0; width: 64px;
z-index: 30; cursor: pointer;
}

/* Animated corner fold */
.corner-fold {
width: 0; height: 0;
border-style: solid;
border-width: 0 0 32px 32px;
border-color: transparent transparent rgba(201,168,76,.18) transparent;
transition: all .25s ease;
filter: drop-shadow(-2px -2px 4px rgba(201,168,76,.1));
}
.tap-fwd:hover .corner-fold {
border-width: 0 0 44px 44px;
border-color: transparent transparent rgba(201,168,76,.35) transparent;
filter: drop-shadow(-3px -3px 8px rgba(201,168,76,.25));
}

/* ── PAGE CONTENT SYSTEM ── */
.pc {
position: absolute; inset: 0;
display: flex; flex-direction: column;
padding: 36px 32px 26px 36px;
overflow: hidden;
}

/* Backgrounds */
.bg-cover {
background:
radial-gradient(ellipse 85% 65% at 50% 38%, rgba(42,4,78,.97) 0%, transparent 62%),
radial-gradient(ellipse 55% 85% at 78% 82%, rgba(9,22,68,.85) 0%, transparent 62%),
linear-gradient(158deg, #08021e 0%, #120448 48%, #030818 100%);
border: 1px solid rgba(201,168,76,.22);
align-items: center; justify-content: center; text-align: center;
padding: 40px 36px;
}
.bg-cover::after {
content: ‘’; position: absolute; inset: 12px;
border: 1px solid rgba(201,168,76,.08);
border-radius: 10px; pointer-events: none;
}

.bg-inner {
background: linear-gradient(158deg, #0d0a28 0%, #060316 58%, #0f0b26 100%);
border: 1px solid rgba(200,180,240,.065);
}

.bg-type {
background: linear-gradient(158deg, #0b0922 0%, #050215 55%, #0d0b22 100%);
border: 1px solid rgba(200,180,240,.055);
}

.bg-cta {
background:
radial-gradient(ellipse 80% 55% at 50% 38%, rgba(42,4,78,.85) 0%, transparent 62%),
linear-gradient(158deg, #0d0a28 0%, #060316 58%, #0f0b2e 100%);
border: 1px solid rgba(201,168,76,.2);
align-items: center; justify-content: center; text-align: center;
padding: 40px 32px;
}

/* Group accent lines */
.gr-r { border-top: 2px solid rgba(212,160,176,.45); }
.gr-l { border-top: 2px solid rgba(200,180,240,.4); }
.gr-e { border-top: 2px solid rgba(201,168,76,.45); }
.gr-m { border-top: 2px solid rgba(126,206,202,.4); }

/* Starfield for cover/cta */
.pg-stars {
position: absolute; inset: 0; pointer-events: none;
background-image:
radial-gradient(1px 1px at 11% 16%, rgba(255,255,255,.9) 0,transparent 100%),
radial-gradient(1px 1px at 34%  8%, rgba(255,255,255,.7) 0,transparent 100%),
radial-gradient(1px 1px at 67% 21%, rgba(255,255,255,.8) 0,transparent 100%),
radial-gradient(1px 1px at 87% 13%, rgba(255,255,255,.6) 0,transparent 100%),
radial-gradient(1px 1px at 21% 76%, rgba(255,255,255,.7) 0,transparent 100%),
radial-gradient(1px 1px at 79% 71%, rgba(255,255,255,.8) 0,transparent 100%),
radial-gradient(1.5px 1.5px at 44% 46%, rgba(201,168,76,.4) 0,transparent 100%),
radial-gradient(1px 1px at 58% 88%, rgba(200,180,240,.35) 0,transparent 100%);
}

/* ── Typography ── */
.t-hdr {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: clamp(6px,1.5vw,7px); letter-spacing: 4px;
color: rgba(201,168,76,.6); text-transform: uppercase;
padding-bottom: 9px; margin-bottom: 14px;
border-bottom: 1px solid rgba(201,168,76,.18);
flex-shrink: 0;
}

.t-pg {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: clamp(6px,1.5vw,7px); letter-spacing: 3px;
color: rgba(201,168,76,.5); text-align: center;
margin-top: auto; padding-top: 10px; flex-shrink: 0;
}

.t-title {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: clamp(13px,3.5vw,16px); color: var(–pale);
letter-spacing: 1px; margin-bottom: 8px; flex-shrink: 0; line-height: 1.3;
}

.t-body {
font-family: ‘Cormorant Garamond’, ‘Georgia’, serif; font-size: clamp(12px, 2.5vw, 13.5px);
color: rgba(240,234,255,.96); line-height: 1.85;
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
scrollbar-width: none; /* Firefox */
-ms-overflow-style: none; /* IE */
}
.t-body::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

.t-rule {
width: 100%; height: 1px;
background: linear-gradient(90deg, transparent, rgba(201,168,76,.35), transparent);
flex-shrink: 0; margin: 11px 0;
}

.t-quote {
font-family: ‘Cormorant Garamond’, ‘Georgia’, serif; font-style: italic;
font-size: clamp(12px,2.8vw,14px); color: #e8dcff; line-height: 1.85;
text-align: center; flex-shrink: 0;
}

.t-typenum {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: clamp(7px,1.8vw,7.5px); letter-spacing: 3.5px;
color: rgba(201,168,76,.65); margin-bottom: 4px; flex-shrink: 0;
}

.t-name {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-weight: 700;
font-size: clamp(15px,4.5vw,19px); color: var(–pale);
letter-spacing: 2px; margin-bottom: 10px; flex-shrink: 0; line-height: 1.2;
}

.t-glyph {
font-size: 11px; letter-spacing: 7px;
margin-bottom: 10px; flex-shrink: 0;
display: block;
}

/* Cover elements */
.cv-label {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: 7.5px; letter-spacing: 5px;
color: rgba(201,168,76,.48); text-transform: uppercase;
}
.cv-orn {
font-size: 10px; letter-spacing: 10px; color: rgba(201,168,76,.55);
animation: pulse 5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.45;} 50%{opacity:.85; text-shadow:0 0 22px rgba(201,168,76,.5);} }
.cv-rule { width: 90px; height: 1px; background: linear-gradient(90deg,transparent,rgba(201,168,76,.48),transparent); }
.cv-title {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-weight: 700;
font-size: clamp(20px,5.5vw,26px); color: var(–pale); letter-spacing: 2px; line-height: 1.25;
text-shadow: 0 0 50px rgba(201,168,76,.2);
}
.cv-sub {
font-family: ‘Cormorant Garamond’, serif; font-style: italic;
font-size: 12.5px; color: var(–dust); opacity: .78; letter-spacing: .5px; line-height: 1.65;
}
.cv-meta {
font-size: 8.5px; letter-spacing: 3px; color: rgba(200,180,240,.4);
text-transform: uppercase; line-height: 2.1; margin-top: 2px;
}

/* TOC */
.toc-sec {
font-family: ‘Cinzel’, serif; font-size: 7px; letter-spacing: 3px;
color: rgba(201,168,76,.48); text-transform: uppercase; margin: 9px 0 3px;
}
.toc-row {
display: flex; align-items: baseline; gap: 5px;
padding: 2.5px 0; border-bottom: 1px solid rgba(200,180,240,.04);
}
.toc-n { font-family: ‘Cormorant Garamond’, ‘Georgia’, serif; font-size: clamp(10px,2.5vw,11.5px); color: rgba(240,234,255,.92); flex: 1; }
.toc-d { flex: 1; border-bottom: 1px dotted rgba(201,168,76,.16); margin: 0 3px; height: 1px; align-self: center; }
.toc-p { font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: 7px; color: rgba(201,168,76,.65); letter-spacing: 1px; }

/* CTA */
.cta-box {
border: 1px solid rgba(201,168,76,.32); border-radius: 10px;
padding: 13px 18px; background: rgba(201,168,76,.045); width: 88%; margin: 5px 0;
}
.cta-a { font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: 9.5px; letter-spacing: 2px; color: var(–gold); display: block; margin-bottom: 3px; }
.cta-u { font-family: ‘Raleway’, sans-serif; font-size: 9px; color: rgba(200,180,240,.52); letter-spacing: .5px; }
.cta-p { font-family: ‘Cormorant Garamond’, serif; font-size: 23px; font-weight: 600; color: var(–gold2); display: block; margin-top: 2px; }

/* ── Nav ── */
.nav {
display: flex; align-items: center; gap: 20px;
position: relative; z-index: 10;
}
.nbtn {
background: none; border: 1px solid rgba(201,168,76,.26);
color: var(–gold); font-family: ‘Cinzel’, ‘Palatino Linotype’, serif;
font-size: 8.5px; letter-spacing: 3px; padding: 9px 22px;
cursor: pointer; border-radius: 28px; transition: all .28s;
text-transform: uppercase;
}
.nbtn:hover:not(:disabled) {
background: rgba(201,168,76,.07);
border-color: rgba(201,168,76,.5);
box-shadow: 0 0 18px rgba(201,168,76,.1);
}
.nbtn:disabled { opacity: .18; cursor: default; }
.ninfo {
font-family: ‘Cinzel’, ‘Palatino Linotype’, serif; font-size: 7.5px; letter-spacing: 2px;
color: rgba(201,168,76,.5); min-width: 95px; text-align: center;
}
.hint {
font-family: ‘Raleway’, ‘Helvetica Neue’, sans-serif; font-size: 7.5px; letter-spacing: 2.5px;
color: rgba(200,180,240,.3); text-transform: uppercase;
position: relative; z-index: 10;
}

/* Progress bar */
.progress-wrap {
position: relative; z-index: 10;
width: var(–W);
height: 2px;
background: rgba(255,255,255,.06);
border-radius: 2px;
overflow: hidden;
}
.progress-bar {
height: 100%;
background: linear-gradient(90deg, rgba(201,168,76,.4), rgba(201,168,76,.8));
border-radius: 2px;
transition: width .4s ease;
width: 0%;
}
</style>

</head>
<body>

<noscript>
  <style>body{color:white;font-family:serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#03020c;}</style>
  <p style="text-align:center;font-size:18px;">Please enable JavaScript to view the StarSeed Soul Typology flipbook.</p>
</noscript>
<div class="cosmos"></div>

<div class="scene">
  <div class="book" id="book"></div>

  <div class="progress-wrap"><div class="progress-bar" id="pb"></div></div>
  <div class="nav">
    <button class="nbtn" id="bp" onclick="goBack()">← Back</button>
    <div class="ninfo" id="ni">Cover</div>
    <button class="nbtn" id="bn" onclick="goFwd()">Next →</button>
  </div>
  <div class="hint">Tap right edge · swipe · arrow keys</div>
</div>

<script>
// ─────────────────────────────────────
// PAGE DEFINITIONS
// ─────────────────────────────────────
function cover() {
  return `<div class="pc bg-cover">
    <div class="pg-stars"></div>
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="cv-label">The Book of Souls</div>
      <div class="cv-orn">✦ ✧ ✦</div>
      <div class="cv-rule"></div>
      <div class="cv-title">StarSeed Soul<br>Typology</div>
      <div class="cv-rule"></div>
      <div class="cv-sub">24 Soul Types · A Map of Who You Are</div>
      <div class="cv-meta">Olesya Popova · 2026</div>
    </div>
  </div>`;
}

function toc() {
  return `<div class="pc bg-inner" style="padding:24px 26px 16px 30px;">
    <div class="t-hdr">StarSeed Soul Typology</div>
    <div class="t-title" style="font-size:13px;margin-bottom:8px;">Contents</div>
    <div class="toc-row"><span class="toc-n">Introduction</span><span class="toc-d"></span><span class="toc-p">II</span></div>
    <div style="height:4px;"></div>
    <div class="toc-row"><span class="toc-n">Siriusian Souls</span><span class="toc-d"></span><span class="toc-p">01</span></div>
    <div class="toc-row"><span class="toc-n">Pleiadian Souls</span><span class="toc-d"></span><span class="toc-p">02</span></div>
    <div class="toc-row"><span class="toc-n">Lemurian Souls</span><span class="toc-d"></span><span class="toc-p">03</span></div>
    <div class="toc-row"><span class="toc-n">Cassiopeian Souls</span><span class="toc-d"></span><span class="toc-p">04</span></div>
    <div class="toc-row"><span class="toc-n">Procyonian Souls</span><span class="toc-d"></span><span class="toc-p">05</span></div>
    <div class="toc-row"><span class="toc-n">Lyran Souls</span><span class="toc-d"></span><span class="toc-p">06</span></div>
    <div class="toc-row"><span class="toc-n">Arcturian Souls</span><span class="toc-d"></span><span class="toc-p">07</span></div>
    <div class="toc-row"><span class="toc-n">Orion Souls</span><span class="toc-d"></span><span class="toc-p">08</span></div>
    <div class="toc-row"><span class="toc-n">Vegan Souls</span><span class="toc-d"></span><span class="toc-p">09</span></div>
    <div class="toc-row"><span class="toc-n">Zeta Reticulan Souls</span><span class="toc-d"></span><span class="toc-p">10</span></div>
    <div class="toc-row"><span class="toc-n">Epsilon Eridan Souls</span><span class="toc-d"></span><span class="toc-p">11</span></div>
    <div class="toc-row"><span class="toc-n">Atlantean Souls</span><span class="toc-d"></span><span class="toc-p">12</span></div>
    <div class="toc-row"><span class="toc-n">Andromedan Souls</span><span class="toc-d"></span><span class="toc-p">13</span></div>
    <div class="toc-row"><span class="toc-n">Polarisian Souls</span><span class="toc-d"></span><span class="toc-p">14</span></div>
    <div class="toc-row"><span class="toc-n">Nibiruan Souls</span><span class="toc-d"></span><span class="toc-p">15</span></div>
    <div class="toc-row"><span class="toc-n">Egyptian · Titan · Blue Avian</span><span class="toc-d"></span><span class="toc-p">16–18</span></div>
    <div class="toc-row"><span class="toc-n">Tau Cetian · Aldebaran · Centaurian</span><span class="toc-d"></span><span class="toc-p">19–21</span></div>
    <div class="toc-row"><span class="toc-n">Herculean · Anunnaki · Hyperborean</span><span class="toc-d"></span><span class="toc-p">22–24</span></div>
    <div class="toc-row"><span class="toc-n">Conclusion · Find Your Type</span><span class="toc-d"></span><span class="toc-p">XXV</span></div>
    <div class="t-pg">I</div>
  </div>`;
}

function intro() {
  return `<div class="pc bg-inner" style="padding:28px 28px 20px 32px;overflow:hidden;">
    <div class="t-hdr">Introduction</div>
    <div class="t-quote" style="font-size:12.5px;margin-bottom:4px;">"If you want to find the secrets of the universe, think in terms of energy, frequency and vibration."</div>
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(201,168,76,.8);text-align:right;margin-bottom:8px;padding-right:4px;letter-spacing:.5px;">— Nikola Tesla</div>
    <div class="t-rule"></div>
    <div class="t-body" style="font-size:12px;line-height:1.75;">
      Imagine a map of the universe where every star system carries its own signature — its own way of organizing life, movement, connection, and creation. Not better or worse. Just different patterns of intelligence expressed in different forms.<br><br>
      This book is built on that idea. Starseed Soul is a system of 24 distinct soul types, each representing a unique energetic blueprint. These types describe how you naturally experience the world, how you relate to others, how you make decisions, and where your natural strengths and challenges live.<br><br>
      This is not personality typing. It goes deeper than behavior or habits. It speaks to the underlying structure of how you are wired on a soul level.<br><br>

// ─────────────────────────────────────
// ENGINE
// ─────────────────────────────────────
const book = document.getElementById('book');
const N = PAGES.length;
let cur = 0;
let busy = false;

// Build all pages
const els = PAGES.map((p, i) => {
  const el = document.createElement('div');
  el.className = 'page';
  el.innerHTML = p.html + '<div class="page-shadow"></div>';

  // Right-edge tap zone (forward)
  const tf = document.createElement('div');
  tf.className = 'tap-fwd';
  tf.innerHTML = '<div class="corner-fold"></div>';
  tf.addEventListener('click', e => { e.stopPropagation(); goFwd(); });
  el.appendChild(tf);

  // Left-edge tap zone (back) — not on cover
  if (i > 0) {
    const tb = document.createElement('div');
    tb.className = 'tap-bwd';
    tb.addEventListener('click', e => { e.stopPropagation(); goBack(); });
    el.appendChild(tb);
  }

  book.appendChild(el);
  return el;
});

function applyStack() {
  els.forEach((el, i) => {
    el.classList.remove('is-current', 'flipping-fwd', 'flipping-bwd');
    if (i < cur) {
      el.style.cssText = `transform:rotateY(-180deg); z-index:${i + 1}; transition:none;`;
    } else if (i === cur) {
      el.style.cssText = `transform:rotateY(0deg); z-index:50; transition:none;`;
      el.classList.add('is-current');
    } else {
      el.style.cssText = `transform:rotateY(0deg); z-index:${N - i}; transition:none;`;
    }
  });
  document.getElementById('ni').textContent = PAGES[cur].label;
  document.getElementById('bp').disabled = cur === 0;
  document.getElementById('bn').disabled = cur === N - 1;
  // Update progress bar
  document.getElementById('pb').style.width = (cur / (N - 1) * 100) + '%';
}

let busyTimer = null;

function releaseBusy() {
  busy = false;
  if (busyTimer) { clearTimeout(busyTimer); busyTimer = null; }
}

function goFwd() {
  if (cur >= N - 1 || busy) return;
  busy = true;
  // Safety: release busy after 1.2s no matter what
  busyTimer = setTimeout(releaseBusy, 1200);

  const flipping = els[cur];
  const next = els[cur + 1];

  next.style.cssText = `transform:rotateY(0deg); z-index:49; transition:none;`;
  flipping.style.cssText = `transform:rotateY(0deg); z-index:60; transition:none;`;
  flipping.classList.remove('is-current');

  flipping.getBoundingClientRect();
  flipping.classList.add('flipping-fwd');

  setTimeout(() => {
    cur++;
    applyStack();
    releaseBusy();
  }, 700);
}

function goBack() {
  if (cur <= 0 || busy) return;
  busy = true;
  busyTimer = setTimeout(releaseBusy, 1200);

  cur--;
  const unflipping = els[cur];

  unflipping.style.cssText = `transform:rotateY(-180deg); z-index:60; transition:none;`;

  unflipping.getBoundingClientRect();
  unflipping.classList.add('flipping-bwd');

  setTimeout(() => {
    applyStack();
    releaseBusy();
  }, 700);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goFwd();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goBack();
});

// Touch swipe
let tx0 = 0;
book.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
book.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx0;
  if (dx < -45) goFwd();
  else if (dx > 45) goBack();
}, { passive: true });

// Init — wrapped in rAF to guarantee DOM is painted before we measure
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    applyStack();
  });
});
</script>
