<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StarSeedSoul Hero Magnetic Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#020202;overflow:hidden}.hero{position:relative;width:100vw;height:100vh;background:#020202}.hero-ref{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;filter:brightness(.72) contrast(1.18)}.shade{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,0) 0%,rgba(0,0,0,.08) 56%,rgba(0,0,0,.46) 100%)}#magnetic{position:absolute;inset:0;width:100%;height:100%;z-index:2;mix-blend-mode:screen;pointer-events:none}.copy{position:absolute;left:0;right:0;bottom:8vh;z-index:3;text-align:center;pointer-events:none;color:#e8e4df}.copy h1{font-family:Georgia,serif;font-weight:300;font-size:clamp(42px,7vw,92px);letter-spacing:clamp(10px,2vw,28px);text-transform:uppercase;text-shadow:0 0 28px rgba(0,0,0,.95)}.copy p{margin-top:18px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#8e867c}
</style>
</head>
<body>
<section class="hero">
<img id="heroRef" class="hero-ref" src="hero-reference.png" alt="wireframe faces reference" />
<canvas id="magnetic"></canvas>
<div class="shade"></div>
<div class="copy"><h1>StarSeedSoul</h1><p>Recognize your origin</p></div>
</section>
<script>
const canvas=document.getElementById('magnetic');const ctx=canvas.getContext('2d');const heroRef=document.getElementById('heroRef');let W,H,DPR,needles=[];let start=performance.now();
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);buildNeedles()}window.addEventListener('resize',resize);
function refOpacity(now){const period=8;let p=(now%period)/period;if(p<.18)return .24+(.56-.24)*(p/.18);if(p<.42)return .56+(.90-.56)*((p-.18)/.24);if(p<.68)return .90+(.62-.90)*((p-.42)/.26);return .62+(.24-.62)*((p-.68)/.32)}
function facePoint(side){const y=H*(.24+Math.random()*.47);const local=(y-H*.24)/(H*.47);const bulge=Math.sin(local*Math.PI);if(side==='left')return{x:W*(.31+Math.random()*.18+bulge*.045)+(Math.random()-.5)*22,y:y+(Math.random()-.5)*24};return{x:W*(.51+Math.random()*.18-bulge*.045)+(Math.random()-.5)*22,y:y+(Math.random()-.5)*24}}
function makeNeedle(delay){const from=Math.random()<.5?'left':'right';return{from,a:facePoint(from),b:facePoint(from==='left'?'right':'left'),delay,life:3.8+Math.random()*2.4,jitter:2+Math.random()*5,randomPower:.72+Math.random()*.38}}
function buildNeedles(){needles=[];let delay=0;for(let i=0;i<34;i++){delay+=.12+Math.random()*.34;if(Math.random()<.22){let burst=2+Math.floor(Math.random()*3);for(let b=0;b<burst;b++)needles.push(makeNeedle(delay+b*(.05+Math.random()*.08)));}else needles.push(makeNeedle(delay));}}
function opacityCurve(p){if(p<0||p>1)return 0;return Math.sin(Math.PI*p)}
function ease(x){return x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
function recycle(n,now){Object.assign(n,makeNeedle(now+1.2+Math.random()*3.8))}
function draw(ms){const now=(ms-start)*.001;const t=ms*.001;const refA=refOpacity(now);heroRef.style.opacity=refA.toFixed(3);const normalized=Math.max(0,Math.min(1,(refA-.20)/.70));const master=Math.pow(normalized,2.8);ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';needles.forEach((n,i)=>{if(now<n.delay)return;let p=(now-n.delay)/n.life;if(p>=1){recycle(n,now);return}let localAlpha=opacityCurve(p)*n.randomPower;let alpha=localAlpha*master;let grow=ease(Math.min(1,p/.58));let ax=n.a.x+Math.sin(t*1.1+i)*n.jitter;let ay=n.a.y+Math.cos(t*.9+i)*n.jitter*.45;let endX=ax+(n.b.x-ax)*grow;let endY=ay+(n.b.y-ay)*grow;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(endX,endY);ctx.strokeStyle=`rgba(232,213,168,${alpha*.36})`;ctx.lineWidth=.30+alpha*.46;ctx.stroke();ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(endX,endY);ctx.strokeStyle=`rgba(255,236,190,${alpha*.055})`;ctx.lineWidth=.85;ctx.stroke();const tip=.65+alpha*1.45;ctx.beginPath();ctx.arc(endX,endY,tip,0,Math.PI*2);ctx.fillStyle=`rgba(232,213,168,${alpha*.34})`;ctx.fill();});requestAnimationFrame(draw)}resize();requestAnimationFrame(draw);
</script>
</body>
</html>
