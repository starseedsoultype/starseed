<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StarSeedSoul Hero Static Face Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#030303;overflow:hidden}.hero{position:relative;width:100vw;height:100vh;background:radial-gradient(circle at center,#111 0%,#050505 55%,#000 100%)}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.copy{position:absolute;left:0;right:0;bottom:9vh;z-index:3;text-align:center;pointer-events:none;color:#e8e4df}.copy h1{font-family:Georgia,serif;font-weight:300;font-size:clamp(42px,7vw,92px);letter-spacing:clamp(10px,2vw,28px);text-transform:uppercase;text-shadow:0 0 24px rgba(0,0,0,.95)}.copy p{margin-top:18px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#8e867c}
</style>
</head>
<body>
<section class="hero"><canvas id="heroCanvas"></canvas><div class="copy"><h1>StarSeedSoul</h1><p>Recognize your origin</p></div></section>
<script>
const canvas=document.getElementById('heroCanvas');const ctx=canvas.getContext('2d');let W,H,dpr;
function resize(){dpr=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);W=innerWidth;H=innerHeight;draw()}addEventListener('resize',resize);
function T(p,cx,cy,sc,s){return{x:cx+s*p[0]*sc,y:cy+p[1]*sc}}
function drawPolyline(points,cx,cy,sc,s,width=1.1,alpha=.72){ctx.beginPath();points.forEach((p,i)=>{let q=T(p,cx,cy,sc,s);if(i)ctx.lineTo(q.x,q.y);else ctx.moveTo(q.x,q.y)});ctx.strokeStyle=`rgba(232,213,168,${alpha})`;ctx.lineWidth=width;ctx.stroke()}
function drawMesh(cx,cy,sc,s,masc){const contour=[[-.42,-.48],[-.20,-.58],[.08,-.55],[.25,-.44],[.31,-.32],[.43,-.23],[.29,-.16],[.38,-.08],[.22,-.03],[.28,.08],[.12,.17],[.05,.31],[-.10,.45],[-.31,.50],[-.48,.35],[-.56,.10],[-.54,-.18],[-.42,-.48]];drawPolyline(contour,cx,cy,sc,s,1.45,.78);const featureLines=[[[.02,-.25],[.18,-.22],[.30,-.16]],[[.19,-.02],[.35,-.08]],[[.12,.13],[.27,.10]],[[.02,.27],[.16,.24]],[[-.33,-.04],[-.43,.04],[-.33,.13],[-.25,.04],[-.33,-.04]],[[-.34,-.42],[-.18,-.30],[.04,-.25]],[[-.34,.34],[-.12,.24],[.06,.18]]];featureLines.forEach(l=>drawPolyline(l,cx,cy,sc,s,.9,.55));let nodes=[];function addGrid(x1,x2,y1,y2,cols,rows){for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){let x=x1+(x2-x1)*c/(cols-1)+(Math.random()-.5)*.035;let y=y1+(y2-y1)*r/(rows-1)+(Math.random()-.5)*.035;let taper=1-Math.abs(y+.02)*.6;if(Math.random()<taper)nodes.push([x,y])}}}addGrid(-.40,.22,-.40,.37,9,12);nodes.push([.30,-.16],[.36,-.08],[.24,.04],[.18,.14],[.06,.30],[-.31,.46],[-.48,.20],[-.48,-.15],[-.22,-.52]);let pts=nodes.map(p=>T(p,cx,cy,sc,s));for(let i=0;i<pts.length;i++){let nearest=[];for(let j=0;j<pts.length;j++){if(i===j)continue;let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<sc*.19)nearest.push({j,d})}nearest.sort((a,b)=>a.d-b.d);nearest.slice(0,4).forEach(n=>{if(n.j>i){let a=pts[i],b=pts[n.j];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(232,213,168,${.16+(1-n.d/(sc*.19))*.30})`;ctx.lineWidth=.62;ctx.stroke()}})}
for(let i=0;i<18;i++){let base=pts[Math.floor(Math.random()*pts.length)];let len=sc*(.18+Math.random()*.28);let ang=(s<0?Math.PI:0)+(Math.random()-.5)*1.6;ctx.beginPath();ctx.moveTo(base.x,base.y);ctx.lineTo(base.x+Math.cos(ang)*len,base.y+Math.sin(ang)*len);ctx.strokeStyle='rgba(232,213,168,.20)';ctx.lineWidth=.55;ctx.stroke()}
}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#030303';ctx.fillRect(0,0,W,H);let sc=Math.min(W,H)*.66;let cy=H*.38;let leftCx=W*.5-W*.125;let rightCx=W*.5+W*.125;drawMesh(leftCx,cy,sc,-1,true);drawMesh(rightCx,cy,sc,1,false);ctx.lineWidth=.55;for(let i=0;i<42;i++){let y=cy-sc*.28+i*sc*.013;ctx.beginPath();ctx.moveTo(W*.5-sc*.055,y);ctx.lineTo(W*.5+sc*.055,y+(Math.random()-.5)*18);ctx.strokeStyle='rgba(232,213,168,.18)';ctx.stroke()} }
resize();
</script>
</body>
</html>
