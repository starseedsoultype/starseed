<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StarSeedSoul Hero Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#050505;overflow:hidden;font-family:Arial,sans-serif}.hero{position:relative;width:100vw;height:100vh;background:radial-gradient(circle at center,#111 0%,#050505 58%,#000 100%)}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.copy{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;pointer-events:none;color:#e8e4df}.copy h1{margin-top:44vh;font-family:Georgia,serif;font-weight:300;font-size:clamp(42px,7vw,92px);letter-spacing:clamp(10px,2vw,28px);text-transform:uppercase}.copy p{margin-top:18px;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#8e867c}
</style>
</head>
<body>
<section class="hero"><canvas id="heroCanvas"></canvas><div class="copy"><h1>StarSeedSoul</h1><p>Recognize your origin</p></div></section>
<script>
const canvas=document.getElementById('heroCanvas');const ctx=canvas.getContext('2d');let w,h,dpr;let mouse={x:0,y:0,active:false};function resize(){dpr=Math.min(window.devicePixelRatio||1,2);w=canvas.width=Math.floor(innerWidth*dpr);h=canvas.height=Math.floor(innerHeight*dpr);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}resize();addEventListener('resize',resize);addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true});function profilePoints(side){const s=side==='left'?-1:1;const cx=innerWidth*.5+s*innerWidth*.105;const cy=innerHeight*.42;const scale=Math.min(innerWidth,innerHeight)*.43;const face=[[0,-.5],[.12,-.45],[.20,-.34],[.24,-.22],[.34,-.16],[.23,-.10],[.28,-.02],[.16,.03],[.22,.12],[.06,.19],[.02,.33],[-.10,.45],[-.30,.50],[-.42,.35],[-.48,.10],[-.48,-.18],[-.35,-.38]];const pts=[];for(let i=0;i<face.length;i++){const a=face[i],b=face[(i+1)%face.length];for(let k=0;k<7;k++){const t=k/7;const x=a[0]*(1-t)+b[0]*t;const y=a[1]*(1-t)+b[1]*t;pts.push({x:cx+s*x*scale,y:cy+y*scale})}}for(let i=0;i<95;i++){const rx=(Math.random()-.5)*.55;const ry=(Math.random()-.5)*.9;pts.push({x:cx+s*(rx-.18)*scale,y:cy+ry*scale})}return pts}const targets=[...profilePoints('left'),...profilePoints('right')];const particles=targets.map((target,i)=>({target,x:innerWidth*.5+(Math.random()-.5)*innerWidth*1.1,y:innerHeight*.45+(Math.random()-.5)*innerHeight*.75,vx:0,vy:0,seed:Math.random()*1000}));function loop(time){const t=time*.001;ctx.clearRect(0,0,innerWidth,innerHeight);ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(0,0,innerWidth,innerHeight);const cycle=(Math.sin(t*.23-Math.PI/2)+1)/2;const form=Math.pow(cycle,1.7);const mousePull=mouse.active?Math.max(0,1-Math.hypot(mouse.x-innerWidth/2,mouse.y-innerHeight*.42)/(innerWidth*.45)):0;const intensity=Math.min(1,form+mousePull*.28);particles.forEach(p=>{const driftX=innerWidth*.5+Math.sin(t*.17+p.seed)*innerWidth*.35;const driftY=innerHeight*.45+Math.cos(t*.13+p.seed)*innerHeight*.28;const breathe=Math.sin(t*.9+p.seed)*8;const goalX=driftX*(1-intensity)+(p.target.x+breathe)*intensity;const goalY=driftY*(1-intensity)+(p.target.y+Math.cos(t*.7+p.seed)*7)*intensity;p.vx+=(goalX-p.x)*.018;p.vy+=(goalY-p.y)*.018;p.vx*=.86;p.vy*=.86;p.x+=p.vx;p.y+=p.vy});const maxDist=78;ctx.lineWidth=.65;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const a=particles[i],b=particles[j];const dist=Math.hypot(a.x-b.x,a.y-b.y);if(dist<maxDist){const alpha=(1-dist/maxDist)*(.08+intensity*.42);ctx.strokeStyle=`rgba(232,213,168,${alpha})`;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}}}ctx.lineWidth=.55;ctx.strokeStyle=`rgba(232,213,168,${Math.max(0,intensity-.58)*.5})`;for(let k=0;k<18;k++){const y=innerHeight*.28+k*innerHeight*.018+Math.sin(t+k)*8;ctx.beginPath();ctx.moveTo(innerWidth*.5-innerWidth*.055,y);ctx.lineTo(innerWidth*.5+innerWidth*.055,y+Math.sin(t*.7+k)*10);ctx.stroke()}requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body>
</html>
