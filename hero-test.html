<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StarSeedSoul Hero Magnetic Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#020202;overflow:hidden}.hero{position:relative;width:100vw;height:100vh;background:#020202}.hero-ref{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;filter:brightness(.78) contrast(1.14);opacity:.98}.shade{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,0) 0%,rgba(0,0,0,.14) 56%,rgba(0,0,0,.55) 100%)}#magnetic{position:absolute;inset:0;width:100%;height:100%;z-index:2;mix-blend-mode:screen;pointer-events:none}.copy{position:absolute;left:0;right:0;bottom:8vh;z-index:3;text-align:center;pointer-events:none;color:#e8e4df}.copy h1{font-family:Georgia,serif;font-weight:300;font-size:clamp(42px,7vw,92px);letter-spacing:clamp(10px,2vw,28px);text-transform:uppercase;text-shadow:0 0 28px rgba(0,0,0,.95)}.copy p{margin-top:18px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#8e867c}
</style>
</head>
<body>
<section class="hero">
<img class="hero-ref" src="hero-reference.png" alt="wireframe faces reference" />
<canvas id="magnetic"></canvas>
<div class="shade"></div>
<div class="copy"><h1>StarSeedSoul</h1><p>Recognize your origin</p></div>
</section>
<script>
const canvas=document.getElementById('magnetic');const ctx=canvas.getContext('2d');let W,H,DPR,links=[];let mouse={x:0,y:0,active:false};
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);buildLinks()}window.addEventListener('resize',resize);window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true});
function zone(side,i,total){const t=i/total;const faceY=H*(0.29+t*0.34);const curve=Math.sin(t*Math.PI);if(side==='left'){return{x:W*(0.43-curve*0.065)+(Math.random()-.5)*18,y:faceY+(Math.random()-.5)*24}}return{x:W*(0.57+curve*0.065)+(Math.random()-.5)*18,y:faceY+(Math.random()-.5)*24}}
function buildLinks(){links=[];const n=64;for(let i=0;i<n;i++){const a=zone('left',i,n),b=zone('right',i,n);links.push({ax:a.x,ay:a.y,bx:b.x,by:b.y,oa:{x:a.x,y:a.y},ob:{x:b.x,y:b.y},phase:Math.random()*Math.PI*2,speed:.35+Math.random()*.45,life:Math.random()})}}
function draw(ms){const t=ms*.001;ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';const cx=W/2,cy=H*.42;const pull=mouse.active?Math.max(0,1-Math.hypot(mouse.x-cx,mouse.y-cy)/(W*.42)):0;links.forEach((l,i)=>{const pulse=(Math.sin(t*l.speed+l.phase)+1)/2;const magnet=.018+pull*.026+pulse*.006;const dx=l.bx-l.ax,dy=l.by-l.ay;l.ax+=dx*magnet;l.ay+=dy*magnet;l.bx-=dx*magnet;l.by-=dy*magnet;l.ax+=(l.oa.x-l.ax)*.012;l.ay+=(l.oa.y-l.ay)*.012;l.bx+=(l.ob.x-l.bx)*.012;l.by+=(l.ob.y-l.by)*.012;const mx=(l.ax+l.bx)/2,my=(l.ay+l.by)/2;const bend=Math.sin(t*.7+l.phase)*18*(.4+pull);ctx.beginPath();ctx.moveTo(l.ax,l.ay);ctx.quadraticCurveTo(mx+bend,my+Math.cos(t*.6+l.phase)*10,l.bx,l.by);const alpha=.045+pulse*.09+pull*.08;ctx.strokeStyle=`rgba(232,213,168,${alpha})`;ctx.lineWidth=.45+pulse*.45;ctx.stroke();if(i%5===0){ctx.beginPath();ctx.moveTo(l.ax,l.ay);ctx.lineTo(mx+(Math.random()-.5)*12,my+(Math.random()-.5)*12);ctx.lineTo(l.bx,l.by);ctx.strokeStyle=`rgba(232,213,168,${alpha*.45})`;ctx.lineWidth=.35;ctx.stroke()}});requestAnimationFrame(draw)}resize();requestAnimationFrame(draw);
</script>
</body>
</html>
