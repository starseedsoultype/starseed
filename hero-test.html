<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StarSeedSoul Hero Magnetic Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#020202;overflow:hidden}.hero{position:relative;width:100vw;height:100vh;background:#020202}.hero-ref{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;filter:brightness(.78) contrast(1.14);opacity:.98}.shade{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,0) 0%,rgba(0,0,0,.10) 56%,rgba(0,0,0,.48) 100%)}#magnetic{position:absolute;inset:0;width:100%;height:100%;z-index:2;mix-blend-mode:screen;pointer-events:none}.copy{position:absolute;left:0;right:0;bottom:8vh;z-index:3;text-align:center;pointer-events:none;color:#e8e4df}.copy h1{font-family:Georgia,serif;font-weight:300;font-size:clamp(42px,7vw,92px);letter-spacing:clamp(10px,2vw,28px);text-transform:uppercase;text-shadow:0 0 28px rgba(0,0,0,.95)}.copy p{margin-top:18px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#8e867c}
</style>
</head>
<body>
<section class="hero">
<img class="hero-ref" src="hero-reference.png" alt="wireframe faces reference" />
<canvas id="magnetic"></canvas>
<div class="shade"></div>
<div class="copy"><h1>StarSeedSoul</h1><p>Recognize your origin</p></div>
</section>
<script>
const canvas=document.getElementById('magnetic');const ctx=canvas.getContext('2d');let W,H,DPR,links=[];
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);buildLinks()}window.addEventListener('resize',resize);
function pointOnLeft(){const y=H*(.33+Math.random()*.28);const curve=Math.sin((y-H*.33)/(H*.28)*Math.PI);return{x:W*(.47-curve*.035)+(Math.random()-.5)*14,y:y+(Math.random()-.5)*18}}
function pointOnRight(){const y=H*(.33+Math.random()*.28);const curve=Math.sin((y-H*.33)/(H*.28)*Math.PI);return{x:W*(.53+curve*.035)+(Math.random()-.5)*14,y:y+(Math.random()-.5)*18}}
function buildLinks(){links=[];for(let i=0;i<92;i++){const a=pointOnLeft(),b=pointOnRight();links.push({a,b,age:Math.random(),speed:.002+Math.random()*.004,life:.45+Math.random()*.55,delay:Math.random(),jitter:Math.random()*8})}}
function resetLink(l){l.a=pointOnLeft();l.b=pointOnRight();l.age=0;l.life=.45+Math.random()*.55;l.speed=.002+Math.random()*.004;l.jitter=Math.random()*8}
function draw(ms){const t=ms*.001;ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';links.forEach((l,i)=>{l.age+=l.speed;let p=l.age/l.life;if(p>=1){resetLink(l);p=0}const fade=p<.18?p/.18:p>.78?(1-p)/.22:1;const ax=l.a.x+Math.sin(t*1.2+i)*l.jitter;const ay=l.a.y+Math.cos(t*.9+i)*l.jitter*.35;const bx=l.b.x+Math.cos(t*1.1+i)*l.jitter;const by=l.b.y+Math.sin(t*.8+i)*l.jitter*.35;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle=`rgba(232,213,168,${.05+fade*.22})`;ctx.lineWidth=.35+fade*.45;ctx.stroke();if(i%4===0){const t1=.35+Math.sin(t+i)*.15;const mx=ax+(bx-ax)*t1,my=ay+(by-ay)*t1;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(mx+(Math.random()-.5)*10,my+(Math.random()-.5)*10);ctx.lineTo(bx,by);ctx.strokeStyle=`rgba(232,213,168,${fade*.06})`;ctx.lineWidth=.32;ctx.stroke()}});requestAnimationFrame(draw)}resize();requestAnimationFrame(draw);
</script>
</body>
</html>
