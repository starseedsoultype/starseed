<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Animation Test</title>
<style>
  body { background: #04030a; color: #e8e0d5; font-family: sans-serif; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; }
  button { padding: 12px; background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3); color: #e8d5b0; cursor: pointer; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 2px; }
  button:hover { background: rgba(201,169,110,0.2); }
  h1 { font-family: Georgia, serif; font-weight: 300; color: #c9a96e; font-size: 24px; }
</style>
</head>
<body>
<h1>Match Animation Test</h1>
<p style="color:#6b6478;font-size:12px;margin-top:8px">Click any connection type to preview the match animation</p>
<div class="grid" id="btns"></div>

<script>
const types = [
  'Frequency Twins','Twin Stars','Cosmic Flow','Mirror Portals',
  'Celestial Mentor','Karmic Bonds','Shadow Contracts',
  'Black Holes','Star Alchemy','Eternal Reflection'
]

const btns = document.getElementById('btns')
types.forEach(t => {
  const b = document.createElement('button')
  b.textContent = t
  b.onclick = () => {
    const iframe = document.getElementById('preview')
    if (iframe) iframe.remove()
    const f = document.createElement('iframe')
    f.id = 'preview'
    f.src = `feed_test.html?type=${encodeURIComponent(t)}`
    f.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:999'
    document.body.appendChild(f)
  }
  btns.appendChild(b)
})
</script>
</body>
</html>
