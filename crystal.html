<script type="module">
import * as THREE from 'three';
import { Line2 } from 'three/addons/lines/Line2.js';

import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

const TYPES = [
  {name:"Siriusian",      funcs:["R","E","M","L"]},
  {name:"Pleiadian",      funcs:["R","M","L","E"]},
  {name:"Lemurian",       funcs:["R","E","L","M"]},

  {name:"Epsilon Eridan", funcs:["L","M","E","R"]},
  {name:"Atlantean",      funcs:["L","R","M","E"]},
  {name:"Andromedan",     funcs:["E","R","L","M"]},
  {name:"Polarisian",     funcs:["E","L","M","R"]},
  {name:"Nibiruan",       funcs:["E","M","R","L"]},
  {name:"Egyptian",       funcs:["E","L","R","M"]},
  {name:"Titanian",       funcs:["E","M","L","R"]},
  {name:"Blue Avian",     funcs:["E","R","M","L"]},
  {name:"Tau Cetian",     funcs:["M","R","E","L"]},
  {name:"Aldebaran",      funcs:["M","L","R","E"]},
  {name:"Centaurian",     funcs:["M","L","E","R"]},
  {name:"Herculean",      funcs:["M","E","R","L"]},
  {name:"Anunnaki",       funcs:["M","E","L","R"]},
  {name:"Hyperborean",    funcs:["M","R","L","E"]},
];

const WEIGHTS = [0, 0.60, 0.25, 0.12, 0.03];
const R3D     = [0, 1.35,  0.95, 0.60, 0.32];
const GOLD    = 0xC9A96E;
const GOLD2   = 0xE8D5A8;

function makeLine2(pts, color, width, opacity=1) {
  const geo = new LineGeometry();
  geo.setPositions(pts.flatMap(p => [p.x, p.y, p.z]));
  const mat = new LineMaterial({ color, linewidth: width, transparent: opacity < 1, opacity, depthTest: false, resolution: new THREE.Vector2(window.innerWidth, window.innerHeight) });
  return new Line2(geo, mat);
}

const PREVIEWS={
  R:{
    1:"Connection is the medium you live in. You read the space between people the way others read words on a page. Your greatest gift is invisible to you. For you, it has always simply been there.",
    2:"You bring people into contact with something real in themselves. In conversation, in presence, in the quality of attention you offer, you are a catalyst for genuine meeting.",
    3:"Relationships are where your deepest learning happens. You are drawn to the complexity of human connection, sometimes more than is comfortable. This territory is your transformation.",
    4:"You receive connection easily, without much analysis. When someone offers warmth or belonging, you absorb it naturally, trusting what arrives without needing to verify it first.",
  },
  E:{
    1:"You were born already knowing what you want. The desire runs underneath everything and does not ask permission. Others often feel more alive in your presence without knowing why.",
    2:"Your aliveness is visible. When you move toward something you want, the room notices. You bring energy into spaces that needed it. This is your creative contribution.",
    3:"The question of desire, what you truly want, whether you are living your actual life, runs through everything you do. This territory is the ground of your growth.",
    4:"You receive energy from your environment freely. You absorb it naturally. Other people's charge becomes available to you without resistance.",
  },
  M:{
    1:"You understand the physical world, money, the body, space, time, with an authority that is simply native to you. You arrived here already knowing how to be real.",
    2:"You make things real. Ideas that float in other people's minds land in the physical world when you are involved. This is your specific creative power, the capacity to bring things into form.",
    3:"The material world is where you work hardest on yourself, money, health, physical stability. You think deeply about these things. That depth is the gift inside the wound.",
    4:"In material matters, you receive what comes easily. Someone handles the food, the space, the logistics, and you absorb it, trusting the provision without needing to direct it.",
  },
  L:{
    1:"You understand how things work, the way a fish understands water. Structure, causality, the architecture of systems, this is your native language, arrived before any effort.",
    2:"You generate ideas and frameworks that others find clarifying. When you speak your thinking aloud, something in the room settles. This is your creative gift.",
    3:"You are drawn to other people's systems and ideas, evaluating them, questioning them, weighing them. This intelligence is most alive when it is fed by those who think at the deepest level.",
    4:"You receive frameworks and explanations readily. When something is presented to you coherently, you absorb it and use it, trusting the structure you are given rather than needing to build it from scratch.",
  },
};

const GUMROAD_LINKS = {
  "Siriusian":       "https://starseedsoul.gumroad.com/l/soul-20",
  "Pleiadian":       "https://starseedsoul.gumroad.com/l/soul-17",
  "Lemurian":        "https://starseedsoul.gumroad.com/l/soul-13",
  "Cassiopeian":     "https://starseedsoul.gumroad.com/l/soul-7",
  "Procyonian":      "https://starseedsoul.gumroad.com/l/soul-19",
  "Lyran":           "https://starseedsoul.gumroad.com/l/soul-14",
  "Arcturian":       "https://starseedsoul.gumroad.com/l/soul-4",
  "Orion":           "https://starseedsoul.gumroad.com/l/soul-16",
  "Vegan":           "https://starseedsoul.gumroad.com/l/soul-23",
  "Zeta Reticulan":  "https://starseedsoul.gumroad.com/l/soul-24",
  "Epsilon Eridan":  "https://starseedsoul.gumroad.com/l/soul-10",
  "Atlantean":       "https://starseedsoul.gumroad.com/l/soul-5",
  "Andromedan":      "https://starseedsoul.gumroad.com/l/soul-2",
  "Polarisian":      "https://starseedsoul.gumroad.com/l/soul-18",
  "Nibiruan":        "https://starseedsoul.gumroad.com/l/soul-15",
  "Egyptian":        "https://starseedsoul.gumroad.com/l/soul-9",
  "Titanian":        "https://starseedsoul.gumroad.com/l/soul-22",
  "Blue Avian":      "https://starseedsoul.gumroad.com/l/soul-6",
  "Tau Cetian":      "https://starseedsoul.gumroad.com/l/soul-21",
  "Aldebaran":       "https://starseedsoul.gumroad.com/l/soul-1",
  "Centaurian":      "https://starseedsoul.gumroad.com/l/soul-8",
  "Herculean":       "https://starseedsoul.gumroad.com/l/soul-11",
  "Anunnaki":        "https://starseedsoul.gumroad.com/l/soul-3",
  "Hyperborean":     "https://starseedsoul.gumroad.com/l/soul-12",
};

let current = 12;

function getChannels(idx) {
  const ch = {};
  TYPES[idx].funcs.forEach((f, i) => { ch[f] = i + 1; });
  return ch;
}

// ── THREE.JS ────────────────────────────────────────────────────
let scene, camera, renderer, crystalGroup, clock;
let targetRX = 0, targetRY = 0;

const EDGE_DEFS = [['E','R'],['R','M'],['M','L'],['L','E']];
const EDGE_SEG  = 48;
let pulseLines   = [];
let tipPositions = {};
let orbitGroup   = null;

function initThree() {
  const stage  = document.querySelector('.stage');
  const canvas = document.getElementById('crystalCanvas');
  const S = stage.offsetWidth;
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.setSize(S, S);
  clock  = new THREE.Clock();
  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(44, 1, 0.1, 50);
  camera.position.set(0, 0, 4.5);
  scene.add(new THREE.AmbientLight(0xffffff, 0.08));
  const key = new THREE.DirectionalLight(GOLD, 1.2);
  key.position.set(3, 4, 5); scene.add(key);
  const fill = new THREE.DirectionalLight(0x8A7444, 0.4);
  fill.position.set(-4, -2, 3); scene.add(fill);
  document.addEventListener('mousemove', e => {
    targetRX = (e.clientY / window.innerHeight - 0.5) * 0.3;
    targetRY = (e.clientX / window.innerWidth  - 0.5) * 0.3;
  });
  window.addEventListener('resize', () => { renderer.setSize(stage.offsetWidth, stage.offsetWidth); });
}

function buildCrystal(idx) {
  if (crystalGroup) {
    crystalGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
    scene.remove(crystalGroup);
  }
  if (orbitGroup) {
    orbitGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
    scene.remove(orbitGroup);
  }
  crystalGroup = new THREE.Group();
  pulseLines   = [];

  const ch = getChannels(idx);
  tipPositions = {
    E: new THREE.Vector3(0,           R3D[ch.E],  0),
    M: new THREE.Vector3(0,          -R3D[ch.M],  0),
    R: new THREE.Vector3( R3D[ch.R],  0,           0),
    L: new THREE.Vector3(-R3D[ch.L],  0,           0),
  };

  const O = new THREE.Vector3(0, 0, 0);

  // dark metallic faces
  for (const [a, b] of EDGE_DEFS) {
    const pos = [...O.toArray(), ...tipPositions[a].toArray(), ...tipPositions[b].toArray()];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.computeVertexNormals();
    crystalGroup.add(new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
      color: 0x111111, metalness: 0.7, roughness: 0.1,
      clearcoat: 1.0, clearcoatRoughness: 0.05,
      transmission: 0.6, thickness: 0.3,
      side: THREE.DoubleSide, transparent: true, opacity: 0.75, depthWrite: false,
    })));
  }

  // dim static gold outline
  const outerPts = ['E','R','M','L','E'].map(k => tipPositions[k]);
  crystalGroup.add(makeLine2(outerPts, GOLD, 2.5, 0.55));
  for (const [a, b] of [['E','M'],['R','L']]) {
    crystalGroup.add(makeLine2([tipPositions[a], tipPositions[b]], GOLD, 1.5, 0.22));
  }

  // animated pulse lines — the edge itself lights up
  EDGE_DEFS.forEach(([a, b], i) => {
    const N   = EDGE_SEG;
    const pts = [];
    for (let j = 0; j < N; j++)
      pts.push(new THREE.Vector3().lerpVectors(tipPositions[a], tipPositions[b], j / (N - 1)));
    const geo      = new THREE.BufferGeometry().setFromPoints(pts);
    const colBuf   = new Float32Array(N * 3);
    const colorAttr = new THREE.BufferAttribute(colBuf, 3);
    geo.setAttribute('color', colorAttr);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
    }));
    crystalGroup.add(line);
    const speed = 0.38 / ((ch[a] + ch[b]) * 0.5);
    pulseLines.push({ colorAttr, speed, phase: i * 0.25 });
  });

  // gold tip dots
  for (const [f, pos] of Object.entries(tipPositions)) {
    const r = [0, 0.055, 0.04, 0.028, 0.018][ch[f]];
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(r, 12, 12),
      new THREE.MeshStandardMaterial({ color: GOLD, metalness: 1, roughness: 0.3, emissive: GOLD, emissiveIntensity: 0.5 })
    );
    dot.position.copy(pos);
    crystalGroup.add(dot);
  }

  // center
  crystalGroup.add(Object.assign(new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 16, 16),
    new THREE.MeshStandardMaterial({ color: GOLD2, metalness: 1, roughness: 0.2, emissive: GOLD, emissiveIntensity: 0.6 })
  )));

  // ── elliptical orbits passing exactly through opposing vertices ──
  orbitGroup = new THREE.Group();

  // E↔M orbit: passes through E(0,rE,0) and M(0,-rM,0)
  // center offset = (rE-rM)/2, semi-major = (rE+rM)/2
  const emCy    = (R3D[ch.E] - R3D[ch.M]) / 2;
  const emMajor = (R3D[ch.E] + R3D[ch.M]) / 2;
  const emMinor = Math.max(R3D[ch.R], R3D[ch.L]) * 0.55;
  const emPts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    emPts.push(new THREE.Vector3(0, emCy + Math.sin(a) * emMajor, Math.cos(a) * emMinor));
  }
  orbitGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(emPts),
    new THREE.LineBasicMaterial({ color: GOLD, transparent: true, opacity: 0.65, depthTest: false })
  ));

  // R↔L orbit: passes through R(rR,0,0) and L(-rL,0,0)
  // center offset = (rR-rL)/2, semi-major = (rR+rL)/2
  const rlCx    = (R3D[ch.R] - R3D[ch.L]) / 2;
  const rlMajor = (R3D[ch.R] + R3D[ch.L]) / 2;
  const rlMinor = Math.max(R3D[ch.E], R3D[ch.M]) * 0.55;
  const rlPts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    rlPts.push(new THREE.Vector3(rlCx + Math.cos(a) * rlMajor, 0, Math.sin(a) * rlMinor));
  }
  orbitGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(rlPts),
    new THREE.LineBasicMaterial({ color: GOLD, transparent: true, opacity: 0.65, depthTest: false })
  ));

  crystalGroup.add(orbitGroup);
  scene.add(crystalGroup);
}

const goldC   = new THREE.Color(GOLD);
const brightC = new THREE.Color(GOLD2);

function startLoop() {
  (function loop() {
    requestAnimationFrame(loop);
    const t = clock.getElapsedTime();
    if (crystalGroup) {
      crystalGroup.rotation.y = t * 0.07 + targetRY * 0.25;
      crystalGroup.rotation.x += (targetRX * 0.3 - crystalGroup.rotation.x) * 0.05;
    }


    // energy pulse: illuminate the edge itself
    pulseLines.forEach(({ colorAttr, speed, phase }) => {
      const N    = EDGE_SEG;
      const head = (t * speed + phase) % 1;
      for (let j = 0; j < N; j++) {
        const pos  = j / (N - 1);
        const d    = Math.min(Math.abs(pos - head), 1 - Math.abs(pos - head));
        const b    = Math.exp(-d * d * 90) + Math.exp(-d * d * 14) * 0.3;
        const c    = goldC.clone().lerp(brightC, Math.min(b, 1));
        colorAttr.setXYZ(j, c.r * b, c.g * b, c.b * b);
      }
      colorAttr.needsUpdate = true;
    });
    renderer.render(scene, camera);
  })();
}

function updateText(idx) {
  const name = TYPES[idx].name;
  document.getElementById('typeName').textContent       = name;
  document.getElementById('readingEyebrow').textContent = `Soul Reading · ${name}`;
  document.title = `${name} Soul Crystal — StarSeedSoul`;
  const btn = document.getElementById('unlockBtn');
  const url = GUMROAD_LINKS[name];
  btn.href  = (url && !url.includes('REPLACE')) ? url : 'quiz.html';
  TYPES[idx].funcs.forEach((f, i) => {
    document.getElementById(`desc${i+1}text`).textContent = PREVIEWS[f][i+1];
  });
}

function draw(idx) { buildCrystal(idx); updateText(idx); }

const sel = document.getElementById('typeSelector');
TYPES.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'type-btn' + (i === current ? ' active' : '');
  btn.textContent = t.name;
  btn.onclick = () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    current = i; draw(i);
  };
  sel.appendChild(btn);
});

initThree();
draw(current);
startLoop();
</script>
